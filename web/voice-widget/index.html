<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>GMIC AI — Voice</title>
<style>
  /* ============================================================
     GMIC 语音留言组件(独立页 /voice-widget/)。精巧小浮窗,以【音条】为主角。
     交互:点小麦克风 → 弹小浮窗 → 长按录音(浮动波条起伏)→ 底部填 email(必填)→ 发送。
     设计要点(Luna 2026-07-17 定):浮窗精巧不臃肿;波条是浮动波条【不套方框】,一开始就是
       一条静止的横线让用户看懂"这里是说话的地方",说话才起伏;联系方式只留 email 一个输入框
       放最下面;不做转写预览(多余)。将来 gmic.ai 的 fabMic 长按即可打开本页(iframe/浮层)。
     后端:POST /voice/transcribe(本页不用)、POST /voice/message(发送:email 必填 → Slack)。
     ============================================================ */
  :root {
    --accent: #4f46e5; --accent-ink: #fff; --bg: #ffffff; --panel: #f5f6f9;
    --text: #1f2430; --muted: #7a8194; --border: #e3e6ef; --danger: #e5484d;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #14161c; --panel: #1b1e26; --text: #eceef4; --muted: #9aa2b4; --border: #2a2f3b; }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: transparent; }

  /* 页面:居中一个"点我说话"的小麦克风(将来由 gmic.ai fabMic 代劳) */
  #stage { height: 100vh; display: flex; align-items: center; justify-content: center; }
  #launcher { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer;
    color: var(--muted); font-size: 13px; background: none; border: none; font-family: inherit; }
  #launcher .fab { width: 62px; height: 62px; border-radius: 50%; background: var(--accent); color: #fff;
    display: grid; place-items: center; font-size: 26px; box-shadow: 0 8px 22px rgba(79,70,229,.4); }

  /* 浮窗:精巧小卡片(不铺满屏) */
  .ov { position: fixed; inset: 0; z-index: 50; display: none; align-items: center; justify-content: center;
    background: rgba(15,17,24,.42); backdrop-filter: blur(2px); padding: 16px; }
  .ov.show { display: flex; }
  .card { width: 100%; max-width: 300px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 18px; box-shadow: 0 16px 50px rgba(0,0,0,.28); padding: 14px 16px 16px;
    animation: pop .16s ease-out; }
  @keyframes pop { from { transform: scale(.96); opacity: .5; } to { transform: none; opacity: 1; } }

  .hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .hd .t { font-size: 13.5px; font-weight: 650; color: var(--text); }
  .x { border: none; background: none; color: var(--muted); font-size: 17px; cursor: pointer; line-height: 1; }

  /* ⭐ 浮动波条:不套方框,透明背景;开局一条静止横线,说话才起伏 */
  #wave { display: block; width: 100%; height: 46px; margin: 6px 0 2px; }

  .status { text-align: center; font-size: 12px; color: var(--muted); min-height: 16px; margin-bottom: 8px; }
  .status.rec { color: var(--danger); font-weight: 600; }

  /* 长按说话的圆麦克风 */
  #mic { width: 100%; padding: 12px; border-radius: 13px; border: 1px solid var(--border); background: var(--panel);
    color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; user-select: none; -webkit-user-select: none;
    touch-action: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
  #mic .m { font-size: 18px; }
  #mic.rec { background: var(--danger); color: #fff; border-color: var(--danger); animation: pulse 1.3s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(229,72,77,.5); } 70% { box-shadow: 0 0 0 9px rgba(229,72,77,0); } 100% { box-shadow: 0 0 0 0 rgba(229,72,77,0); } }

  /* email:唯一联系方式,单个输入框,放最下面 */
  .em-lbl { font-size: 11px; color: var(--muted); margin: 12px 0 5px; }
  .em-lbl b { color: var(--danger); }
  #email { width: 100%; padding: 10px 12px; font-size: 14px; font-family: inherit; border: 1px solid var(--border);
    border-radius: 11px; background: var(--panel); color: var(--text); outline: none; }
  #email:focus { border-color: var(--accent); }
  .em-hint { font-size: 11.5px; min-height: 15px; margin-top: 4px; color: var(--muted); }
  .em-hint.bad { color: var(--danger); }

  #send { width: 100%; margin-top: 12px; padding: 12px; border: none; border-radius: 13px; background: var(--accent);
    color: var(--accent-ink); font-size: 14.5px; font-weight: 650; cursor: pointer; }
  #send:disabled { opacity: .4; cursor: default; }

  .done { text-align: center; padding: 20px 6px; }
  .done .big { font-size: 32px; } .done .m2 { margin-top: 8px; font-size: 13.5px; color: var(--text); }
</style>
</head>
<body>
<div id="stage">
  <button id="launcher"><span class="fab">🎙️</span>Tap to leave a voice message</button>
</div>

<div class="ov" id="ov">
  <div class="card" id="card">
    <div id="body">
      <div class="hd"><span class="t">🎙️ Voice message</span><button class="x" id="close">✕</button></div>

      <!-- ⭐ 音条:主角。浮动波条,开局静止横线 -->
      <canvas id="wave"></canvas>
      <div class="status" id="status">Hold the button and speak</div>
      <button id="mic"><span class="m">🎤</span><span id="micLabel">Hold to talk</span></button>

      <!-- email:唯一联系方式,单框,放最下面 -->
      <div class="em-lbl">Your email <b>*</b> — so we can reply</div>
      <input id="email" type="email" inputmode="email" autocomplete="email" placeholder="you@example.com" />
      <div class="em-hint" id="emHint"></div>

      <button id="send" disabled>Send</button>
    </div>
  </div>
</div>

<script>
/* 独立语音组件。后端:POST /voice/message(multipart:session_id, contact_type=email, contact_value, audio)。同源相对路径。 */
const API = (window.GMIC_BOT_API || "").replace(/\/$/, "");
const $ = (id) => document.getElementById(id);
const ov = $("ov"), card = $("card"), body = $("body"),
      waveEl = $("wave"), statusEl = $("status"), micBtn = $("mic"), micLabel = $("micLabel"),
      emailEl = $("email"), emHint = $("emHint"), sendBtn = $("send");

const EMAIL_RE = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;
const MAX_REC_MS = 60000;

let recording = false, recorder = null, chunks = [], stream = null, mime = "audio/webm";
let audioBlob = null;
let audioCtx = null, analyser = null, waveOn = false, raf = 0;
let t0 = 0, maxTimer = 0, downAt = 0;

// ---- 开/关浮窗 ----
$("launcher").addEventListener("click", openModal);
$("close").addEventListener("click", closeModal);
ov.addEventListener("click", (e) => { if (e.target === ov) closeModal(); });

function openModal() {
  audioBlob = null; emailEl.value = ""; emHint.textContent = ""; emHint.className = "em-hint";
  statusEl.textContent = "Hold the button and speak"; statusEl.className = "status";
  micLabel.textContent = "Hold to talk";
  ov.classList.add("show");
  startWaveLoop();          // ⭐ 浮窗一打开就画波条(静止横线),让用户看懂这里是说话的地方
  updateSend();
}
function closeModal() {
  if (recording) stopRec();
  stopWaveLoop();
  ov.classList.remove("show");
}

// ---- email 校验 ----
function emailValid() { return EMAIL_RE.test(emailEl.value.trim()); }
function updateSend() { sendBtn.disabled = !(emailValid() && audioBlob); }
emailEl.addEventListener("input", () => {
  if (!emailEl.value.trim()) { emHint.textContent = ""; emHint.className = "em-hint"; }
  else if (emailValid()) { emHint.textContent = ""; emHint.className = "em-hint"; }
  else { emHint.textContent = "That doesn't look like a valid email."; emHint.className = "em-hint bad"; }
  updateSend();
});

// ---- 长按录音(pointer 统一触摸/鼠标)----
micBtn.addEventListener("pointerdown", (e) => { e.preventDefault(); startRec(); });
window.addEventListener("pointerup", () => { if (recording) stopRec(); });
window.addEventListener("pointercancel", () => { if (recording) stopRec(); });

async function startRec() {
  if (recording) return;
  if (!navigator.mediaDevices || !window.MediaRecorder) { statusEl.textContent = "Voice not supported in this browser."; return; }
  try { stream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
  catch (e) { statusEl.textContent = "Please allow microphone access."; statusEl.className = "status bad"; return; }

  chunks = []; audioBlob = null; updateSend();
  recorder = new MediaRecorder(stream); mime = recorder.mimeType || "audio/webm";
  recorder.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
  recorder.onstop = onRecStop;
  recorder.start();

  recording = true; downAt = Date.now(); t0 = Date.now();
  micBtn.classList.add("rec"); micLabel.textContent = "Release to finish";
  statusEl.className = "status rec"; tick();
  connectAnalyser(stream);      // 让波条接上真实音量开始起伏
  maxTimer = setTimeout(() => { if (recording) stopRec(); }, MAX_REC_MS);
}
function stopRec() {
  if (!recording) return;
  recording = false; clearTimeout(maxTimer);
  micBtn.classList.remove("rec"); micLabel.textContent = "Hold to talk";
  try { recorder.stop(); } catch (e) {}
}
function onRecStop() {
  disconnectAnalyser();          // 断开分析器 → 波条回到静止横线
  if (stream) { stream.getTracks().forEach((t) => t.stop()); stream = null; }
  const held = Date.now() - downAt;
  if (held < 400 || !chunks.length) { statusEl.textContent = "Too short — hold and speak."; statusEl.className = "status bad"; return; }
  audioBlob = new Blob(chunks, { type: mime });
  const secs = Math.round(held / 1000);
  statusEl.textContent = `Recorded ✓ ${secs}s · hold again to redo`; statusEl.className = "status";
  updateSend();
}
function tick() {
  if (!recording) return;
  const s = Math.floor((Date.now() - t0) / 1000);
  statusEl.textContent = `● Recording ${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
  setTimeout(tick, 250);
}

/* ============================================================
   ⭐ 浮动波条:透明背景、无方框。浮窗一开就跑这个循环:
   - 没在录音 → 画一条静止的横线(所有波条压到最矮),让用户看懂这里是说话区;
   - 录音中  → 用 AnalyserNode 的音量数据让波条起伏。
   ============================================================ */
function startWaveLoop() { if (waveOn) return; waveOn = true; drawWave(); }
function stopWaveLoop() { waveOn = false; if (raf) cancelAnimationFrame(raf), raf = 0; }
function connectAnalyser(stream) {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser(); analyser.fftSize = 128; src.connect(analyser);
  } catch (e) { /* 波条失败不影响录音 */ }
}
function disconnectAnalyser() {
  if (audioCtx) { try { audioCtx.close(); } catch (e) {} audioCtx = null; }
  analyser = null;
}
function drawWave() {
  if (!waveOn) return;
  const cv = waveEl, ctx = cv.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  if (cv.width !== Math.round(cv.clientWidth * dpr)) { cv.width = Math.round(cv.clientWidth * dpr); cv.height = Math.round(cv.clientHeight * dpr); }
  const W = cv.width, H = cv.height, mid = H / 2;
  ctx.clearRect(0, 0, W, H);
  const bars = 32, gap = W / bars, bw = Math.max(2 * dpr, gap * 0.42), minH = 3 * dpr;

  let data = null;
  if (recording && analyser) { data = new Uint8Array(analyser.frequencyBinCount); analyser.getByteFrequencyData(data); }

  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--accent").trim() || "#4f46e5";
  for (let i = 0; i < bars; i++) {
    let h = minH;                                            // 默认:静止横线(最矮)
    if (data) {
      const v = data[Math.floor(i * data.length / bars)] / 255;   // 0..1 音量
      h = Math.max(minH, v * (H - 4 * dpr));
    }
    const x = i * gap + (gap - bw) / 2;
    // 圆角竖条,以中线为中心上下对称(像声波)
    const r = bw / 2;
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(x, mid - h / 2, bw, h, r) : ctx.rect(x, mid - h / 2, bw, h);
    ctx.fill();
  }
  raf = requestAnimationFrame(drawWave);
}

// ---- 发送(email 必填 + 有录音才能点)----
sendBtn.addEventListener("click", async () => {
  if (sendBtn.disabled) return;
  if (!emailValid()) { emHint.textContent = "Please enter a valid email."; emHint.className = "em-hint bad"; return; }
  if (!audioBlob) { statusEl.textContent = "Please record a message first."; statusEl.className = "status bad"; return; }
  sendBtn.disabled = true; sendBtn.textContent = "Sending…";
  try {
    // 每条语音留言 = 一张独立 Slack 卡:用一次性 session_id,保证卡头标成"语音留言"
    const sid = "voice_" + (crypto.randomUUID ? crypto.randomUUID() : Date.now() + "_" + Math.floor(Math.random() * 1e6));
    const fd = new FormData();
    fd.append("session_id", sid);
    fd.append("contact_type", "email");
    fd.append("contact_value", emailEl.value.trim());
    fd.append("audio", audioBlob, "voice." + extFor(mime));
    fd.append("page_url", document.referrer || location.href);
    // 注:不传 text —— 前端不做转写(已去除);后端会自己转写一次填进 Slack 卡的 need
    const res = await fetch(API + "/voice/message", { method: "POST", body: fd });
    if (!res.ok) throw new Error("/voice/message -> " + res.status);
    showDone(emailEl.value.trim());
  } catch (e) {
    sendBtn.disabled = false; sendBtn.textContent = "Send";
    statusEl.textContent = "Couldn't send — please try again."; statusEl.className = "status bad";
  }
});

function extFor(m) {
  if (!m) return "webm";
  if (m.includes("mp4") || m.includes("m4a")) return "m4a";
  if (m.includes("ogg")) return "ogg";
  if (m.includes("wav")) return "wav";
  return "webm";
}

function showDone(email) {
  stopWaveLoop();
  const ok = document.createElement("div");
  ok.className = "done";
  ok.innerHTML = `<div class="big">✅</div><div class="m2">Voice message sent!<br>We'll reply at <b></b>.</div>`;
  ok.querySelector("b").textContent = email;
  body.replaceChildren(ok);
  setTimeout(closeModal, 2500);
}
</script>
</body>
</html>
