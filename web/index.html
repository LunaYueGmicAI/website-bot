<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>GMIC AI — Chat</title>
<style>
  /* ============================================================
     GMIC 网站咨询 widget —— 单文件自包含(内联 CSS/JS),做成 iframe 独立页。
     iframe 内 origin = 后端域,fetch /chat /event 属同源,不依赖 CORS。
     定位:多语言"询盘 intake + 导览 + 直接联系我们"。语音=聊天里的听写输入,bot 一律文字回复。
     布局(从上到下):头部(标题) / 消息区(问候+快捷按钮列+对话) / 固定联系条 / 输入栏。
     联系方式全走对话捕获(bot readback 确认);已删掉早期的"可选邮箱框"(拐杖 + 会被记忆覆盖)。
     ============================================================ */
  :root {
    --accent: #4f46e5;          /* 主色:靛蓝 */
    --accent-ink: #ffffff;
    --bg: #ffffff;
    --panel: #f5f6f9;
    --bubble-bot: #eef0f6;
    --bubble-user: var(--accent);
    --text: #1f2430;
    --muted: #7a8194;
    --border: #e3e6ef;
    --radius: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161c; --panel: #1b1e26; --bubble-bot: #232733; --text: #eceef4;
      --muted: #9aa2b4; --border: #2a2f3b;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: transparent; color: var(--text); }

  /* 整个 widget = 一张带边框/圆角/阴影的卡片(Q7:给聊天框加边线) */
  #app {
    display: flex; flex-direction: column;
    height: 100vh; max-width: 440px; margin: 0 auto;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: 0 10px 40px rgba(20, 22, 30, .12);
    overflow: hidden;
  }

  /* ---- 头部:只放标题 ---- */
  header { padding: 13px 16px; border-bottom: 1px solid var(--border); background: var(--bg); }
  header .title { font-weight: 650; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; }

  /* (原"可选邮箱框"CSS 已删:那个框是给语音兜底的拐杖,又会被对话记忆覆盖,鸡肋。
     联系方式现在全走对话捕获 + bot readback 确认。) */

  /* ---- 消息区 ---- */
  #messages { flex: 1; overflow-y: auto; padding: 14px 12px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 84%; padding: 9px 12px; border-radius: var(--radius); font-size: 14px; line-height: 1.45;
    white-space: pre-wrap; word-wrap: break-word; }
  .msg.bot  { align-self: flex-start; background: var(--bubble-bot); color: var(--text); border-bottom-left-radius: 5px; }
  .msg.user { align-self: flex-end;   background: var(--bubble-user); color: var(--accent-ink); border-bottom-right-radius: 5px; }
  .msg a { color: inherit; text-decoration: underline; }
  .learn-more { display: inline-block; margin-top: 6px; font-size: 12px; padding: 4px 10px; border-radius: 999px;
    border: 1px solid var(--border); color: var(--accent); text-decoration: none; }
  .qr-img { display: block; margin-top: 8px; width: 168px; max-width: 100%; border-radius: 10px; border: 1px solid var(--border); }

  /* Q3/Q5:快捷按钮做成 greeting 下的【一列】、更醒目;常驻可反复点 */
  .quick-col { display: flex; flex-direction: column; gap: 8px; align-self: stretch; margin: 2px 0 4px; }
  .quick-col .q-btn {
    text-align: left; font-size: 14px; font-weight: 550; padding: 12px 14px; border-radius: 13px;
    border: 1px solid var(--border); background: var(--panel); color: var(--text); cursor: pointer; transition: .12s;
  }
  .quick-col .q-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }

  /* FAQ 展开的问题 chips */
  .faq-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .chip { font-size: 13px; padding: 7px 11px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); cursor: pointer; }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  /* 输入中三点 */
  .typing { align-self: flex-start; display: flex; gap: 4px; padding: 11px 13px; background: var(--bubble-bot); border-radius: var(--radius); }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: blink 1.2s infinite both; }
  .typing span:nth-child(2) { animation-delay: .2s; } .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: .3; } 40% { opacity: 1; } }

  /* ---- Q2/Q5:固定"直接联系我们"条(复制官网联系方式组,醒目、不随对话滚动)---- */
  .contacts { border-top: 1px solid var(--border); background: var(--panel); padding: 8px 10px; }
  .contacts .lbl { font-size: 10.5px; letter-spacing: .3px; text-transform: uppercase; color: var(--muted); margin: 0 2px 6px; }
  .contacts .row { display: flex; gap: 6px; overflow-x: auto; justify-content: center; }
  .contacts .c-btn { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 3px;
    min-width: 58px; padding: 7px 6px; border-radius: 11px; border: 1px solid var(--border); background: var(--bg);
    color: var(--text); text-decoration: none; font-size: 11px; cursor: pointer; }
  .contacts .c-btn:hover { border-color: var(--accent); color: var(--accent); }
  .contacts .c-btn .ic { font-size: 18px; }

  /* ---- 输入栏:文字 + 麦克风(占位) + 发送 ---- */
  footer { display: flex; align-items: flex-end; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--border); background: var(--bg); }
  #text { flex: 1; resize: none; max-height: 120px; padding: 10px 12px; font-size: 14px; font-family: inherit;
    border: 1px solid var(--border); border-radius: 14px; background: var(--panel); color: var(--text); outline: none; }
  #text:focus { border-color: var(--accent); }
  .icon-btn { flex: 0 0 auto; width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; font-size: 17px; display: grid; place-items: center; }
  #send { background: var(--accent); color: var(--accent-ink); }
  #send:disabled { opacity: .4; cursor: default; }
  #mic { background: var(--panel); color: var(--muted); border: 1px solid var(--border); }
  /* 录音中:变红 + 脉动,提示"正在录、再点停止" */
  #mic.recording { background: #e5484d; color: #fff; border-color: #e5484d; animation: pulse 1.3s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(229,72,77,.5); } 70% { box-shadow: 0 0 0 8px rgba(229,72,77,0); } 100% { box-shadow: 0 0 0 0 rgba(229,72,77,0); } }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="title"><span class="dot"></span> GMIC AI Assistant</div>
  </header>

  <div id="messages" aria-live="polite"></div>

  <div class="contacts" id="contacts" hidden>
    <div class="lbl">Reach us directly</div>
    <div class="row" id="contactRow"></div>
  </div>

  <!-- (原可选邮箱框已删除;联系方式改由对话捕获,bot 会 readback 确认。) -->

  <footer>
    <textarea id="text" rows="1" placeholder="Type your message…"></textarea>
    <button class="icon-btn" id="mic" title="Speak">🎤</button>
    <button class="icon-btn" id="send" title="Send" disabled>➤</button>
  </footer>
</div>

<script>
/* ============================================================
   前端逻辑。后端入口:GET /config、POST /event(topic/faq/link)、POST /chat。
   API 走相对路径(同源);如需指向别的后端可设 window.GMIC_BOT_API。
   ============================================================ */
const API = (window.GMIC_BOT_API || "").replace(/\/$/, "");
const $ = (id) => document.getElementById(id);
const messagesEl = $("messages"), textEl = $("text"), sendBtn = $("send"), micBtn = $("mic");
const MAX_REC_MS = 60000;   // 单次录音上限 60s(后端有 8MB 上限,防超大文件 413)

// 会话身份:存 localStorage,刷新/重开页面仍是同一通对话(和后端 session_id 对齐)
const SID_KEY = "gmic_bot_sid";
let sessionId = localStorage.getItem(SID_KEY);
if (!sessionId) {
  sessionId = "sess_" + (crypto.randomUUID ? crypto.randomUUID() : Date.now() + "_" + Math.floor(Math.random() * 1e6));
  localStorage.setItem(SID_KEY, sessionId);
}

let CONFIG = null;
let busy = false;   // 一次只允许一个在途请求,防连点

async function postJSON(path, body) {
  const res = await fetch(API + path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  if (!res.ok) throw new Error(path + " -> " + res.status);
  return res.json();
}
function scrollDown() { messagesEl.scrollTop = messagesEl.scrollHeight; }

// role: "bot" | "user"
// opts.link = FAQ "了解更多"链接(文案固定 Learn more →)
// opts.action = {url, label} 通用打开按钮(联系方式用:打开 WhatsApp / 拨号 / 写邮件…)
// opts.qr = 微信二维码图
function addBubble(role, text, opts = {}) {
  const el = document.createElement("div");
  el.className = "msg " + role;
  el.textContent = text;
  if (opts.link) {
    const a = document.createElement("a");
    a.className = "learn-more"; a.href = opts.link; a.target = "_blank"; a.rel = "noopener";
    a.textContent = "Learn more →";
    el.appendChild(document.createElement("br")); el.appendChild(a);
  }
  if (opts.action && opts.action.url) {
    const a = document.createElement("a");
    a.className = "learn-more"; a.href = opts.action.url; a.target = "_blank"; a.rel = "noopener";
    a.textContent = opts.action.label || "Open →";
    el.appendChild(document.createElement("br")); el.appendChild(a);
  }
  if (opts.qr) {
    const img = document.createElement("img");
    img.className = "qr-img"; img.src = opts.qr; img.alt = "WeChat QR";
    el.appendChild(img);
  }
  messagesEl.appendChild(el); scrollDown();
  return el;
}

function showTyping() {
  const el = document.createElement("div");
  el.className = "typing"; el.innerHTML = "<span></span><span></span><span></span>";
  messagesEl.appendChild(el); scrollDown();
  return () => el.remove();
}

// greeting 下面的【快捷按钮列】(Q3:常驻;每次都新渲染一组,反复可点)
function renderQuickColumn() {
  const col = document.createElement("div");
  col.className = "quick-col";
  for (const a of CONFIG.quickActions || []) {
    const btn = document.createElement("button");
    btn.className = "q-btn"; btn.textContent = a.label;
    btn.onclick = () => onQuickAction(a);
    col.appendChild(btn);
  }
  messagesEl.appendChild(col); scrollDown();
}

async function onQuickAction(a) {
  if (busy) return;
  if (a.type === "link") {
    if (a.url && !a.url.startsWith("TODO")) window.open(a.url, "_blank", "noopener");
    postJSON("/event", { session_id: sessionId, action: "link", id: a.id }).catch(() => {});
    return;
  }
  if (a.type === "topic") {
    setBusy(true); const stop = showTyping();
    try { const r = await postJSON("/event", { session_id: sessionId, action: "topic", id: a.id });
      stop(); if (r.reply) addBubble("bot", r.reply);
    } catch (e) { stop(); addBubble("bot", "Sorry, something went wrong. Please try again."); }
    setBusy(false); return;
  }
  if (a.type === "faq") renderFaqChips();
}

function renderFaqChips() {
  const wrap = addBubble("bot", "Pick a question:");
  const row = document.createElement("div"); row.className = "faq-chips";
  (CONFIG.faq || []).forEach((item, i) => {
    const c = document.createElement("button");
    c.className = "chip"; c.textContent = item.q;
    c.onclick = () => onFaq(i, item.q);
    row.appendChild(c);
  });
  wrap.appendChild(row); scrollDown();
}

async function onFaq(index, question) {
  if (busy) return;
  addBubble("user", question);
  setBusy(true); const stop = showTyping();
  try { const r = await postJSON("/event", { session_id: sessionId, action: "faq", index });
    stop(); addBubble("bot", r.reply, { link: r.link });
  } catch (e) { stop(); addBubble("bot", "Sorry, something went wrong. Please try again."); }
  setBusy(false);
}

// Q2/Q5:渲染固定"直接联系我们"条(数据来自 /config 的 contacts)。
// 统一交互:点任一按钮 → 在聊天里弹一个气泡,显示【具体信息】(邮箱/电话/链接/二维码)+ 打开按钮。
// 好处:邮箱/电话不依赖本机 mailto/tel 处理器也能看到并复制;每次点击都有可见反馈,和 WeChat 一致。
function renderContacts() {
  const list = CONFIG.contacts || [];
  const row = $("contactRow");
  // ⚡ 快捷动作:放进这一栏最前面(点了把那列按钮弹到对话底部,随时可召唤)
  const q = document.createElement("button");
  q.className = "c-btn";
  q.innerHTML = `<span class="ic">⚡</span>Quick`;
  q.onclick = renderQuickColumn;
  row.appendChild(q);
  // 联系方式按钮
  for (const c of list) {
    const btn = document.createElement("button");
    btn.className = "c-btn";
    btn.innerHTML = `<span class="ic">${c.icon || "•"}</span>${c.label}`;
    btn.onclick = () => onContactClick(c);
    row.appendChild(btn);
  }
  $("contacts").hidden = false;
}

function onContactClick(c) {
  if (c.type === "qr") {
    // 微信:把二维码贴进对话
    addBubble("bot", c.value || "Scan to add us on WeChat:", { qr: c.qr });
  } else {
    // 其余:气泡显示具体值(可复制)+ 一个打开按钮(mailto/tel/深链)
    addBubble("bot", `${c.label}: ${c.value || ""}`, { action: { url: c.url, label: c.open_label } });
  }
}

// 后端在用户报了某 IM 后回传的"直连渠道"(WhatsApp/微信/Telegram)——甩一个"想直接找我们?点这里"的气泡。
// 数据结构就是 /config 里 contacts 的那几条,所以渲染逻辑和 onContactClick 一致(二维码 vs 打开按钮)。
function renderThrowbacks(list) {
  for (const c of list || []) {
    if (c.type === "qr") {
      addBubble("bot", `Prefer ${c.label}? ${c.value || "Scan to add us."}`, { qr: c.qr });
    } else {
      addBubble("bot", `Prefer ${c.label}? You can reach us directly here 👇`,
                { action: { url: c.url, label: c.open_label } });
    }
  }
}

// ---- 打字消息闭环 ----
async function sendText() {
  const text = textEl.value.trim();
  if (!text || busy) return;
  addBubble("user", text);
  textEl.value = ""; autosize();
  setBusy(true); const stop = showTyping();
  try {
    const body = { session_id: sessionId, text, page_url: document.referrer || location.href };
    const r = await postJSON("/chat", body);
    stop(); addBubble("bot", r.reply || "…");
    renderThrowbacks(r.contacts);   // 用户报了 WhatsApp/微信/Telegram 时,附上我们的直连入口
  } catch (e) { stop(); addBubble("bot", "Sorry, I'm having trouble right now — please try again in a moment."); }
  setBusy(false);
}

// ---- 🎤 麦克风听写:录音 → 传 /voice → 转写当用户气泡 + bot 回复 ----
let mediaRecorder = null, recChunks = [], recording = false, recTimer = null;

async function toggleMic() {
  if (recording) { stopRecording(); return; }   // 录音中再点 = 停止并发送
  if (busy) return;                              // 有请求在途先别录
  // 兼容性:老浏览器 / 非安全上下文(非 https/localhost)拿不到 MediaRecorder
  if (!navigator.mediaDevices || !window.MediaRecorder) {
    addBubble("bot", "Voice input isn't supported in this browser — please type instead."); return;
  }
  let stream;
  try { stream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
  catch (e) { addBubble("bot", "I couldn't access your microphone. Please allow mic access, or type instead."); return; }

  recChunks = [];
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size) recChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    clearTimeout(recTimer);
    stream.getTracks().forEach(t => t.stop());   // 关掉麦克风(浏览器上的录音标记消失)
    const mime = mediaRecorder.mimeType || "audio/webm";
    uploadVoice(new Blob(recChunks, { type: mime }), mime);
  };
  mediaRecorder.start();
  recording = true; setMicUI(true);
  recTimer = setTimeout(() => { if (recording) stopRecording(); }, MAX_REC_MS);  // 到点自动停
}

function stopRecording() {
  if (!recording) return;
  recording = false; setMicUI(false);
  try { mediaRecorder.stop(); } catch (e) {}
}

function setMicUI(rec) {
  micBtn.classList.toggle("recording", rec);
  micBtn.textContent = rec ? "⏹" : "🎤";
  micBtn.title = rec ? "Stop & send" : "Speak";
}

// 按浏览器录出的 mime 定文件扩展名(Groq Whisper 支持 webm/m4a/ogg/wav 等)
function extFor(mime) {
  if (!mime) return "webm";
  if (mime.includes("mp4") || mime.includes("m4a")) return "m4a";
  if (mime.includes("ogg")) return "ogg";
  if (mime.includes("wav")) return "wav";
  return "webm";
}

// 【语音两步走】说完 → 第一步 /voice 只转写,拿到就【马上】把"你说的话"上屏(让用户立刻确认
// 自己被准确识别了)→ 再第二步 /reply 出回复,中间显示打字点。这样转写和答案不会一起冒出来。
async function uploadVoice(blob, mime) {
  setBusy(true);
  let stop = showTyping();   // 第一段等待:STT 转写中
  try {
    // ---- 第一步:上传音频,只拿转写 ----
    // 音频走 multipart(不是 JSON);别手动设 Content-Type,浏览器会带 multipart 边界
    const fd = new FormData();
    fd.append("session_id", sessionId);
    fd.append("audio", blob, "voice." + extFor(mime));
    fd.append("page_url", document.referrer || location.href);
    const res = await fetch(API + "/voice", { method: "POST", body: fd });
    if (!res.ok) throw new Error("/voice -> " + res.status);
    const v = await res.json();
    stop();   // 转写回来了,先撤掉打字点

    // 听不清/静音:后端回了兜底 reply、transcript 为空 → 显示一条 bot 兜底气泡,到此为止
    if (!v.transcript) { addBubble("bot", v.reply || "Sorry, I didn't catch that — please try again or type."); setBusy(false); return; }

    // 转写到手 → 立刻当"用户说的话"上屏(此刻 bot 答案还没生成,用户已能看到自己刚说了啥)
    addBubble("user", v.transcript);

    // ---- 第二步:让后端跑大模型出回复 ----
    stop = showTyping();   // 第二段等待:LLM 生成回复中
    const r = await postJSON("/reply", { session_id: sessionId });
    stop();
    addBubble("bot", r.reply || "…");
    renderThrowbacks(r.contacts);   // 语音里报了 IM 时,同样甩直连入口(和打字一致)
  } catch (e) {
    stop(); addBubble("bot", "Sorry, I couldn't process that audio — please try again or type.");
  }
  setBusy(false);
}

function setBusy(v) { busy = v; sendBtn.disabled = v || !textEl.value.trim(); micBtn.disabled = v && !recording; }
function autosize() { textEl.style.height = "auto"; textEl.style.height = Math.min(textEl.scrollHeight, 120) + "px"; sendBtn.disabled = busy || !textEl.value.trim(); }

textEl.addEventListener("input", autosize);
textEl.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendText(); } });
sendBtn.addEventListener("click", sendText);
micBtn.addEventListener("click", toggleMic);

// ---- 启动:拉配置 → 问候语 + 快捷按钮列 + 联系条 ----
(async function init() {
  try { CONFIG = await (await fetch(API + "/config")).json(); }
  catch (e) { CONFIG = { greeting: "Hi 👋 How can we help?", quickActions: [], faq: [], contacts: [] }; }
  addBubble("bot", CONFIG.greeting || "Hi 👋 How can we help?");
  renderQuickColumn();
  renderContacts();
})();
</script>
</body>
</html>
