<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>GMIC AI — Chat</title>
<!-- 官网同款字体 Inter;加载失败自动回落到系统字体栈(见 :root font-family) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     GMIC 网站咨询 widget —— 聊天(纯文字)。单文件自包含,做成 iframe 独立页。
     ⭐ 2026-07-17 拆分:语音已独立成 /voice-widget/(见 web/voice-widget/index.html),
        这里【只做文字聊天】,不含任何语音代码。
     ============================================================ */
  :root {
    --accent: #2563eb; --accent-deep: #1e40af; --accent-ink: #ffffff; --bg: #ffffff; --panel: #f5f6f9;   /* 主色对齐 gmic.ai 官网蓝;deep=更深一档,给专题标题条 */
    --bubble-bot: #eef0f6; --bubble-user: var(--accent); --text: #1f2430;
    --muted: #7a8194; --border: #e3e6ef; --radius: 16px;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #14161c; --panel: #1b1e26; --bubble-bot: #232733; --text: #eceef4; --muted: #9aa2b4; --border: #2a2f3b; }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: transparent; color: var(--text); }
  body { display: flex; align-items: center; justify-content: center; }   /* 大屏上让 widget 垂直居中(高度被下面 max-height 限住时) */

  #app {
    display: flex; flex-direction: column;
    height: 100vh; max-height: 640px; max-width: 440px; margin: auto;   /* 桌面大屏封顶 640px→像正常浮动聊天窗;窗口/iframe 比 640 矮时按实际高(=100vh) */
    background: var(--bg); border: 1px solid var(--border); border-radius: 18px;
    box-shadow: 0 10px 40px rgba(20, 22, 30, .12); overflow: hidden;
  }
  header { padding: 13px 16px; border-bottom: 1px solid var(--border); background: var(--bg); }
  header .title { font-weight: 650; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; }

  #messages { flex: 1; min-height: 0; overflow-y: auto; padding: 14px 12px; display: flex; flex-direction: column; gap: 10px;
    scrollbar-width: thin; scrollbar-color: var(--muted) transparent; }   /* Firefox:细滚动条常显 */
  /* Chrome/Safari:强制显示滚动条(默认悬浮式会自动隐藏,让人误以为不能滚) */
  #messages::-webkit-scrollbar { width: 10px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 5px; border: 2px solid var(--bg); }
  .msg { max-width: 84%; padding: 9px 12px; border-radius: var(--radius); font-size: 14px; line-height: 1.45;
    white-space: pre-wrap; word-wrap: break-word; }
  .msg.bot  { align-self: flex-start; background: var(--bubble-bot); color: var(--text); border-bottom-left-radius: 5px; }
  .msg.user { align-self: flex-end;   background: var(--bubble-user); color: var(--accent-ink); border-bottom-right-radius: 5px; }
  .msg a { color: inherit; text-decoration: underline; }
  .learn-more { display: inline-block; margin-top: 6px; font-size: 12px; padding: 5px 12px; border-radius: 999px;
    background: var(--bg); border: 1px solid var(--accent); color: var(--accent); text-decoration: none;
    font-weight: 550; transition: .12s; }
  .learn-more:hover { background: var(--accent); color: var(--accent-ink); }
  .qr-img { display: block; margin-top: 8px; width: 168px; max-width: 100%; border-radius: 10px; border: 1px solid var(--border); }

  .quick-col { display: flex; flex-direction: column; gap: 8px; align-self: stretch; margin: 2px 0 4px; }
  .quick-col .q-btn { text-align: left; font-size: 14px; font-weight: 550; padding: 12px 14px; border-radius: 13px;
    border: 1px solid var(--border); background: var(--panel); color: var(--text); cursor: pointer; transition: .12s; }
  .quick-col .q-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }

  .faq-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .chip { font-size: 13px; padding: 7px 11px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); cursor: pointer; }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  .typing { align-self: flex-start; display: flex; gap: 4px; padding: 11px 13px; background: var(--bubble-bot); border-radius: var(--radius); }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: blink 1.2s infinite both; }
  .typing span:nth-child(2) { animation-delay: .2s; } .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: .3; } 40% { opacity: 1; } }

  .contacts { border-top: 1px solid var(--border); background: var(--panel); padding: 8px 10px; }
  .contacts .lbl { font-size: 10.5px; letter-spacing: .3px; text-transform: uppercase; color: var(--muted); margin: 0 2px 6px; }
  .contacts .row { display: flex; gap: 6px; overflow-x: auto; justify-content: center; }
  .contacts .c-btn { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 3px;
    min-width: 58px; padding: 7px 6px; border-radius: 11px; border: 1px solid var(--border); background: var(--bg);
    color: var(--text); text-decoration: none; font-size: 11px; cursor: pointer; }
  .contacts .c-btn:hover { border-color: var(--accent); color: var(--accent); }
  .contacts .c-btn .ic { font-size: 18px; }

  footer { display: flex; align-items: flex-end; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--border); background: var(--bg); }
  #text { flex: 1; resize: none; max-height: 120px; padding: 10px 12px; font-size: 14px; font-family: inherit;
    border: 1px solid var(--border); border-radius: 14px; background: var(--panel); color: var(--text); outline: none; }
  #text:focus { border-color: var(--accent); }
  .icon-btn { flex: 0 0 auto; width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; font-size: 17px; display: grid; place-items: center; }
  #send { background: var(--accent); color: var(--accent-ink); }
  #send:disabled { opacity: .4; cursor: default; }

  /* ── 问卷(guided questionnaire)向导卡:一题一屏,内联在消息流里,随进度原地重绘 ── */
  .q-panel { align-self: stretch; border: 1px solid var(--border); background: var(--bg);
    border-radius: 16px; padding: 0; display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 4px 18px rgba(20, 22, 30, .08); }
  /* 专题头:图标 + 标题,给"进入了这个专题"的仪式感(不切屏,历史仍在上方可滑)。
     用实心品牌蓝底 + 白字(不用灰):浅色/深色模式对比度都高,一眼是彩色标题条。
     ⭐ 所有主题共用同一个 accent 色(不做一主题一色)——主题靠图标+文字区分,颜色统一才不乱、才贴官网品牌。 */
  .q-head { display: flex; align-items: center; gap: 9px; padding: 11px 14px;
    background: var(--accent); }   /* 亮蓝标题条(与深蓝 CTA 对调:标题亮、动作深) */
  .q-head .ic { font-size: 19px; line-height: 1; }
  .q-head .tt { font-size: 13.5px; font-weight: 700; color: #fff; letter-spacing: .2px; }
  .q-body { padding: 14px; display: flex; flex-direction: column; gap: 11px; }
  .q-intro { font-size: 13.5px; line-height: 1.55; color: var(--text); }
  /* 进度做成显著的小徽章 + 圆点条 */
  .q-progress { display: inline-flex; align-items: center; gap: 8px; }
  .q-progress .pill { font-size: 10.5px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
    color: var(--accent); background: rgba(37, 99, 235, .1); padding: 3px 9px; border-radius: 999px; }
  .q-progress .dots { display: inline-flex; gap: 4px; }
  .q-progress .dots i { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
  .q-progress .dots i.on { background: var(--accent); }
  .q-title { font-size: 15px; font-weight: 650; line-height: 1.4; }
  .q-opts { display: flex; flex-direction: column; gap: 7px; }
  .q-opt { text-align: left; font-size: 13.5px; padding: 11px 13px; border-radius: 11px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; transition: .12s; }
  .q-opt:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  .q-opt.sel { border-color: var(--accent); background: rgba(37, 99, 235, .08); color: var(--accent); font-weight: 600; }
  .q-opt.sel::before { content: "✓ "; }
  .q-cta { align-self: flex-start; font-size: 13.5px; font-weight: 650; padding: 10px 18px; border-radius: 11px;
    border: none; background: var(--accent-deep); color: var(--accent-ink); cursor: pointer; }   /* 深蓝主动作(与亮蓝标题条对调) */
  /* 导航:Back / Skip / Next 都是有框按钮(点击区大,mobile 友好)。层次:
       Back / Skip → 淡蓝【二级】(有色但不抢);  Next / Done → 深蓝【主动作】(和 CTA 同色)。
     ⚠️ 这些规则都 scope 在 .q-nav 下,不碰顶部那排 quickAction Tab 按钮(它们用 .quick-col .q-btn)。 */
  .q-nav { display: flex; gap: 8px; align-items: center; margin-top: 3px; }
  .q-nav .q-btn { font-size: 12.5px; font-weight: 600; padding: 8px 14px; border-radius: 10px;
    border: 1px solid rgba(37, 99, 235, .30); background: rgba(37, 99, 235, .07); color: var(--accent);
    cursor: pointer; transition: .12s; }
  .q-nav .q-btn:hover { border-color: var(--accent); background: rgba(37, 99, 235, .14); }
  .q-nav .q-next { margin-left: auto; border-color: var(--accent-deep); background: var(--accent-deep); color: var(--accent-ink); }
  .q-nav .q-next:hover { border-color: var(--accent-deep); background: var(--accent-deep); color: var(--accent-ink); opacity: .92; }
</style>
</head>
<body>
<div id="app">
  <header><div class="title"><span class="dot"></span> GMIC AI Assistant</div></header>
  <div id="messages" aria-live="polite"></div>
  <div class="contacts" id="contacts" hidden>
    <div class="lbl">Reach us directly</div>
    <div class="row" id="contactRow"></div>
  </div>
  <footer>
    <textarea id="text" rows="1" placeholder="Type your message…"></textarea>
    <button class="icon-btn" id="send" title="Send" disabled>➤</button>
  </footer>
</div>

<script>
/* 聊天前端(纯文字)。后端:GET /config、POST /event(topic/faq/link)、POST /chat。同源相对路径。 */
const API = (window.GMIC_BOT_API || "").replace(/\/$/, "");
const $ = (id) => document.getElementById(id);
const messagesEl = $("messages"), textEl = $("text"), sendBtn = $("send");

const SID_KEY = "gmic_bot_sid";
let sessionId = localStorage.getItem(SID_KEY);
if (!sessionId) {
  sessionId = "sess_" + (crypto.randomUUID ? crypto.randomUUID() : Date.now() + "_" + Math.floor(Math.random() * 1e6));
  localStorage.setItem(SID_KEY, sessionId);
}
let CONFIG = null, busy = false;
let qState = null;   // 问卷进行中的状态 {tab, questions, idx, answers, panel, def};不在问卷中 = null

async function postJSON(path, body) {
  const res = await fetch(API + path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  if (!res.ok) throw new Error(path + " -> " + res.status);
  return res.json();
}
function scrollDown() { messagesEl.scrollTop = messagesEl.scrollHeight; }

function addBubble(role, text, opts = {}) {
  const el = document.createElement("div");
  el.className = "msg " + role; el.textContent = text;
  if (opts.link) { const a = document.createElement("a"); a.className = "learn-more"; a.href = opts.link; a.target = "_blank"; a.rel = "noopener"; a.textContent = "Learn more →"; el.appendChild(document.createElement("br")); el.appendChild(a); }
  if (opts.action && opts.action.url) { const a = document.createElement("a"); a.className = "learn-more"; a.href = opts.action.url; a.target = "_blank"; a.rel = "noopener"; a.textContent = opts.action.label || "Open →"; el.appendChild(document.createElement("br")); el.appendChild(a); }
  // opts.pills:一组"了解更多"链接药丸,直接挂在【本条气泡】里(紧跟第一句话,不单开一条 "Here's more" 气泡),
  // 让方案文字 + 相关链接看起来是同一句话。先来一行 👇 指向下面的链接,每个链接前加 👉。
  if (Array.isArray(opts.pills) && opts.pills.some(p => p && p.url)) {
    el.appendChild(document.createElement("br"));
    el.appendChild(document.createTextNode("🔍 Check more details"));   // 放大镜提示,后面不加小手指
    for (const p of opts.pills) { if (!p || !p.url) continue; const a = document.createElement("a"); a.className = "learn-more"; a.href = p.url; a.target = "_blank"; a.rel = "noopener"; a.textContent = "👉 " + (p.label || "Open") + " →"; el.appendChild(document.createElement("br")); el.appendChild(a); }
  }
  if (opts.qr) { const img = document.createElement("img"); img.className = "qr-img"; img.src = opts.qr; img.alt = "WeChat QR"; el.appendChild(img); }
  messagesEl.appendChild(el); scrollDown();
  return el;
}
function showTyping() {
  const el = document.createElement("div");
  el.className = "typing"; el.innerHTML = "<span></span><span></span><span></span>";
  messagesEl.appendChild(el); scrollDown();
  return () => el.remove();
}

const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

// 把一段较长的 bot 回复拆成 2-3 句一条的短气泡(现代 chat UI 惯例:短气泡比一大坨易读)。
// 策略保守:先按换行分段;某段仍过长(>180 字符)才从中点最近的句末切一刀,避免误伤缩写/型号里的点号。
function splitReply(text) {
  const t = (text || "").trim();
  const paras = t.split(/\n+/).map((s) => s.trim()).filter(Boolean);
  const out = [];
  for (const p of paras) {
    if (p.length <= 180) { out.push(p); continue; }
    const mid = Math.floor(p.length / 2);
    let cut = -1; const re = /[.!?。!?](\s|$)/g; let m;
    while ((m = re.exec(p))) { if (cut < 0 || Math.abs(m.index - mid) < Math.abs(cut - mid)) cut = m.index + 1; }
    if (cut > 0 && cut < p.length) { out.push(p.slice(0, cut).trim()); out.push(p.slice(cut).trim()); }
    else out.push(p);
  }
  return out.length ? out : [t];
}

// 逐条吐出短气泡(条间留一点停顿,像真人打字);opts(如 link)只挂到最后一条。
async function addBotReply(text, opts = {}) {
  const parts = splitReply(text);
  const pills = opts.pills;                       // 链接药丸:挂到【第一条】气泡(紧跟第一句话)
  const tail = { ...opts }; delete tail.pills;    // 其余(link/action/qr)仍挂【最后一条】
  for (let i = 0; i < parts.length; i++) {
    const o = (i === parts.length - 1) ? { ...tail } : {};
    if (i === 0 && pills) o.pills = pills;
    addBubble("bot", parts[i], o);
    if (i < parts.length - 1) await sleep(350);
  }
}

function renderQuickColumn() {
  const col = document.createElement("div"); col.className = "quick-col";
  for (const a of CONFIG.quickActions || []) {
    const btn = document.createElement("button"); btn.className = "q-btn";
    btn.textContent = (a.icon ? a.icon + "  " : "") + a.label;   // ⭐ 带上 config 里的 icon(之前漏了)
    btn.onclick = () => onQuickAction(a); col.appendChild(btn);
  }
  messagesEl.appendChild(col); scrollDown();
}
async function onQuickAction(a) {
  if (busy || qState) return;                       // 问卷进行中不接受别的快捷动作
  if (a.type === "questionnaire") { startQuestionnaire(a); return; }
  if (a.type === "link") {
    if (a.url && !a.url.startsWith("TODO")) window.open(a.url, "_blank", "noopener");
    postJSON("/event", { session_id: sessionId, action: "link", id: a.id }).catch(() => {}); return;
  }
  if (a.type === "topic") {
    setBusy(true); const stop = showTyping();
    try { const r = await postJSON("/event", { session_id: sessionId, action: "topic", id: a.id }); stop(); if (r.reply) await addBotReply(r.reply); }
    catch (e) { stop(); addBubble("bot", "Sorry, something went wrong. Please try again."); }
    setBusy(false); return;
  }
  if (a.type === "faq") renderFaqChips();
}
function renderFaqChips() {
  const wrap = addBubble("bot", "Pick a question:");
  const row = document.createElement("div"); row.className = "faq-chips";
  (CONFIG.faq || []).forEach((item, i) => {
    const c = document.createElement("button"); c.className = "chip"; c.textContent = item.q;
    c.onclick = () => onFaq(i, item.q); row.appendChild(c);
  });
  wrap.appendChild(row); scrollDown();
}
async function onFaq(index, question) {
  if (busy) return;
  addBubble("user", question); setBusy(true); const stop = showTyping();
  try { const r = await postJSON("/event", { session_id: sessionId, action: "faq", index }); stop(); await addBotReply(r.reply, { link: r.link }); }
  catch (e) { stop(); addBubble("bot", "Sorry, something went wrong. Please try again."); }
  setBusy(false);
}

// 固定"直接联系我们"条(⚡快捷 + 各联系方式;语音已拆走,这里不再有语音按钮)
function renderContacts() {
  const list = CONFIG.contacts || [];
  const row = $("contactRow");
  const q = document.createElement("button");
  q.className = "c-btn"; q.innerHTML = `<span class="ic">⚡</span>Quick`; q.onclick = renderQuickColumn;
  row.appendChild(q);
  for (const c of list) {
    const btn = document.createElement("button"); btn.className = "c-btn";
    btn.innerHTML = `<span class="ic">${c.icon || "•"}</span>${c.label}`;
    btn.onclick = () => onContactClick(c); row.appendChild(btn);
  }
  $("contacts").hidden = false;
}
function onContactClick(c) {
  if (c.type === "qr") addBubble("bot", c.value || "Scan to add us on WeChat:", { qr: c.qr });
  else addBubble("bot", `${c.label}: ${c.value || ""}`, { action: { url: c.url, label: c.open_label } });
}
function renderThrowbacks(list) {
  for (const c of list || []) {
    if (c.type === "qr") addBubble("bot", `Prefer ${c.label}? ${c.value || "Scan to add us."}`, { qr: c.qr });
    else addBubble("bot", `Prefer ${c.label}? You can reach us directly here 👇`, { action: { url: c.url, label: c.open_label } });
  }
}

/* ============================================================
   问卷(guided questionnaire)—— 一题一屏的向导,内联在消息流里。
   全程【不调 LLM】:前端自己收集答案,只在答完最后一题时一次性 POST /questionnaire。
   ⭐ 问卷进行中【锁住文字输入】(只能选/Skip/Back),避免中途插话;答完 bot 出方案后恢复。
   ============================================================ */
function lockInput(locked) {
  // 锁/解底部输入栏。锁住时禁用输入框 + 改占位文案;解锁时按是否有内容决定发送键。
  textEl.disabled = locked;
  textEl.placeholder = locked ? "Answering a few quick questions…" : "Type your message…";
  sendBtn.disabled = locked || busy || !textEl.value.trim();
}

function qHead() {
  // 专题头(图标 + Tab 标题):给"进入了这个专题"的仪式感,但不切屏、历史仍在上方可滑。
  const h = document.createElement("div"); h.className = "q-head";
  const ic = document.createElement("span"); ic.className = "ic"; ic.textContent = qState.icon || "💬";
  const tt = document.createElement("span"); tt.className = "tt"; tt.textContent = qState.label || "A few questions";
  h.append(ic, tt); return h;
}

function startQuestionnaire(action) {
  // 点某个 questionnaire 型 Tab → 建向导卡(会随进度原地重绘),先显示 intro。
  const def = (CONFIG.questionnaires || {})[action.entry_intent];
  if (!def) return;
  qState = { tab: action.entry_intent, icon: action.icon || "", label: action.label || "",
             questions: def.questions || [], idx: -1, answers: {}, panel: null, def };
  lockInput(true);
  const panel = document.createElement("div"); panel.className = "q-panel";
  messagesEl.appendChild(panel); qState.panel = panel;
  renderIntro();
}

function renderIntro() {
  // intro 屏:专题头 + 一句业务介绍 + CTA(进问卷)+ Skip(直接自由聊,不做问卷)。
  const { def, panel } = qState;
  panel.innerHTML = ""; panel.appendChild(qHead());
  const body = document.createElement("div"); body.className = "q-body";
  const intro = document.createElement("div"); intro.className = "q-intro"; intro.textContent = def.intro || "";
  const cta = document.createElement("button"); cta.className = "q-cta";
  cta.textContent = def.cta || "Answer a few questions →"; cta.onclick = () => goToQuestion(0);
  const nav = document.createElement("div"); nav.className = "q-nav";
  const skip = document.createElement("button"); skip.className = "q-btn"; skip.textContent = "Skip — just chat";
  skip.onclick = skipQuestionnaire; nav.appendChild(skip);
  body.append(intro, cta, nav); panel.appendChild(body); scrollDown();
}

function goToQuestion(idx) { qState.idx = idx; renderQuestion(); }

function renderQuestion() {
  // 当前这一题:专题头 + 进度(徽章+圆点)+ 题干 + 选项 + 导航(Back/Skip,多选题多一个 Next/Done)。
  const { questions, idx, answers, panel } = qState;
  const q = questions[idx];
  const isMulti = !!q.multi;
  const selected = isMulti ? new Set(answers[q.id] || []) : null;   // 多选:进来先回显已选(支持 Back 回来改)
  panel.innerHTML = ""; panel.appendChild(qHead());
  const body = document.createElement("div"); body.className = "q-body";

  // 进度:显著的小徽章 + 圆点条(已过/当前点亮)
  const prog = document.createElement("div"); prog.className = "q-progress";
  const pill = document.createElement("span"); pill.className = "pill";
  pill.textContent = `Question ${idx + 1} of ${questions.length}`;
  const dots = document.createElement("span"); dots.className = "dots";
  for (let i = 0; i < questions.length; i++) { const d = document.createElement("i"); if (i <= idx) d.className = "on"; dots.appendChild(d); }
  prog.append(pill, dots);

  const title = document.createElement("div"); title.className = "q-title"; title.textContent = q.q;
  const opts = document.createElement("div"); opts.className = "q-opts";
  for (const opt of q.options || []) {
    const b = document.createElement("button"); b.className = "q-opt"; b.textContent = opt;
    if (isMulti && selected.has(opt)) b.classList.add("sel");
    b.onclick = () => {
      if (isMulti) {                                     // 多选:切换选中,等点 Next 再记录
        if (selected.has(opt)) { selected.delete(opt); b.classList.remove("sel"); }
        else { selected.add(opt); b.classList.add("sel"); }
      } else {                                           // 单选:选中即记 + 自动进下一题(snappy)
        answers[q.id] = opt; advance();
      }
    };
    opts.appendChild(b);
  }

  const nav = document.createElement("div"); nav.className = "q-nav";
  const back = document.createElement("button"); back.className = "q-btn"; back.textContent = "← Back";
  back.onclick = () => { if (idx === 0) renderIntro(); else goToQuestion(idx - 1); };   // 第一题的 Back 回 intro
  const skip = document.createElement("button"); skip.className = "q-btn"; skip.textContent = "Skip";
  skip.onclick = () => { delete answers[q.id]; advance(); };                            // Skip:不记这题
  nav.append(back, skip);
  if (isMulti) {                                          // 多选题需要显式 Next/Done(选完再走)
    const next = document.createElement("button"); next.className = "q-btn q-next";
    next.textContent = idx === questions.length - 1 ? "Done →" : "Next →";
    next.onclick = () => { if (selected.size) answers[q.id] = [...selected]; else delete answers[q.id]; advance(); };
    nav.appendChild(next);
  }
  body.append(prog, title, opts, nav); panel.appendChild(body); scrollDown();
}

function advance() {
  // 还有下一题就翻页,否则提交。
  if (qState.idx < qState.questions.length - 1) goToQuestion(qState.idx + 1);
  else submitQuestionnaire();
}

async function submitQuestionnaire() {
  // 答完:把选择渲染成一条紧凑 user 气泡(每行"标签: 答案")→ POST /questionnaire → bot 方案 + 链接。
  const { tab, questions, answers, panel } = qState;
  const picked = questions.filter(q => answers[q.id] != null).map(q => {
    const v = answers[q.id]; const val = Array.isArray(v) ? v.join(", ") : v;
    return `${q.label || q.q}: ${val}`;                  // 例:"Usage: On a desk / in a room"
  });
  panel.remove();
  addBubble("user", picked.length ? picked.join("\n") : "(skipped the questions)");
  const payload = { session_id: sessionId, tab, answers, page_url: document.referrer || location.href };
  qState = null; lockInput(false);                       // 问卷结束,恢复输入
  setBusy(true); const stop = showTyping();
  try {
    const r = await postJSON("/questionnaire", payload);
    stop(); await addBotReply(r.reply || "…", { pills: r.links }); renderThrowbacks(r.contacts);
  } catch (e) { stop(); addBubble("bot", "Sorry, something went wrong — please try again."); }
  setBusy(false);
}

function skipQuestionnaire() {
  // intro 处点 Skip:撤掉向导卡,直接进自由聊。
  if (qState && qState.panel) qState.panel.remove();
  qState = null; lockInput(false);
  addBubble("bot", "No problem — tell me what you're looking for, or ask me anything.");
}


async function sendText() {
  const text = textEl.value.trim();
  if (!text || busy) return;
  addBubble("user", text); textEl.value = ""; autosize();
  setBusy(true); const stop = showTyping();
  try {
    const r = await postJSON("/chat", { session_id: sessionId, text, page_url: document.referrer || location.href });
    stop(); await addBotReply(r.reply || "…"); renderThrowbacks(r.contacts);
  } catch (e) { stop(); addBubble("bot", "Sorry, I'm having trouble right now — please try again in a moment."); }
  setBusy(false);
}
function setBusy(v) { busy = v; sendBtn.disabled = v || !textEl.value.trim(); }
function autosize() { textEl.style.height = "auto"; textEl.style.height = Math.min(textEl.scrollHeight, 120) + "px"; sendBtn.disabled = busy || !textEl.value.trim(); }

textEl.addEventListener("input", autosize);
textEl.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendText(); } });
sendBtn.addEventListener("click", sendText);

(async function init() {
  try { CONFIG = await (await fetch(API + "/config")).json(); }
  catch (e) { CONFIG = { greeting: "Hi 👋 How can we help?", quickActions: [], faq: [], contacts: [] }; }
  // 欢迎语:支持 \n 换行(把结尾的 "Where would you like to start? 👇" 单独放一行)
  (function () {
    const g = CONFIG.greeting || "Hi 👋 How can we help?";
    const el = addBubble("bot", "");
    g.split("\n").forEach((ln, i) => { if (i) el.appendChild(document.createElement("br")); el.appendChild(document.createTextNode(ln)); });
  })();
  renderQuickColumn(); renderContacts();
})();
</script>
