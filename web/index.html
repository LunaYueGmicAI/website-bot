<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>GMIC AI — Chat</title>
<style>
  /* ============================================================
     GMIC 网站咨询 widget —— 聊天(纯文字)。单文件自包含,做成 iframe 独立页。
     ⭐ 2026-07-17 拆分:语音已独立成 /voice-widget/(见 web/voice-widget/index.html),
        这里【只做文字聊天】,不含任何语音代码。
     ============================================================ */
  :root {
    --accent: #2563eb; --accent-ink: #ffffff; --bg: #ffffff; --panel: #f5f6f9;   /* 主色对齐 gmic.ai 官网蓝 */
    --bubble-bot: #eef0f6; --bubble-user: var(--accent); --text: #1f2430;
    --muted: #7a8194; --border: #e3e6ef; --radius: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #14161c; --panel: #1b1e26; --bubble-bot: #232733; --text: #eceef4; --muted: #9aa2b4; --border: #2a2f3b; }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: transparent; color: var(--text); }

  #app {
    display: flex; flex-direction: column;
    height: 100vh; max-width: 440px; margin: 0 auto;
    background: var(--bg); border: 1px solid var(--border); border-radius: 18px;
    box-shadow: 0 10px 40px rgba(20, 22, 30, .12); overflow: hidden;
  }
  header { padding: 13px 16px; border-bottom: 1px solid var(--border); background: var(--bg); }
  header .title { font-weight: 650; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; }

  #messages { flex: 1; overflow-y: auto; padding: 14px 12px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 84%; padding: 9px 12px; border-radius: var(--radius); font-size: 14px; line-height: 1.45;
    white-space: pre-wrap; word-wrap: break-word; }
  .msg.bot  { align-self: flex-start; background: var(--bubble-bot); color: var(--text); border-bottom-left-radius: 5px; }
  .msg.user { align-self: flex-end;   background: var(--bubble-user); color: var(--accent-ink); border-bottom-right-radius: 5px; }
  .msg a { color: inherit; text-decoration: underline; }
  .learn-more { display: inline-block; margin-top: 6px; font-size: 12px; padding: 4px 10px; border-radius: 999px;
    border: 1px solid var(--border); color: var(--accent); text-decoration: none; }
  .qr-img { display: block; margin-top: 8px; width: 168px; max-width: 100%; border-radius: 10px; border: 1px solid var(--border); }

  .quick-col { display: flex; flex-direction: column; gap: 8px; align-self: stretch; margin: 2px 0 4px; }
  .quick-col .q-btn { text-align: left; font-size: 14px; font-weight: 550; padding: 12px 14px; border-radius: 13px;
    border: 1px solid var(--border); background: var(--panel); color: var(--text); cursor: pointer; transition: .12s; }
  .quick-col .q-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }

  .faq-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .chip { font-size: 13px; padding: 7px 11px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); cursor: pointer; }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  .typing { align-self: flex-start; display: flex; gap: 4px; padding: 11px 13px; background: var(--bubble-bot); border-radius: var(--radius); }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: blink 1.2s infinite both; }
  .typing span:nth-child(2) { animation-delay: .2s; } .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: .3; } 40% { opacity: 1; } }

  .contacts { border-top: 1px solid var(--border); background: var(--panel); padding: 8px 10px; }
  .contacts .lbl { font-size: 10.5px; letter-spacing: .3px; text-transform: uppercase; color: var(--muted); margin: 0 2px 6px; }
  .contacts .row { display: flex; gap: 6px; overflow-x: auto; justify-content: center; }
  .contacts .c-btn { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 3px;
    min-width: 58px; padding: 7px 6px; border-radius: 11px; border: 1px solid var(--border); background: var(--bg);
    color: var(--text); text-decoration: none; font-size: 11px; cursor: pointer; }
  .contacts .c-btn:hover { border-color: var(--accent); color: var(--accent); }
  .contacts .c-btn .ic { font-size: 18px; }

  footer { display: flex; align-items: flex-end; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--border); background: var(--bg); }
  #text { flex: 1; resize: none; max-height: 120px; padding: 10px 12px; font-size: 14px; font-family: inherit;
    border: 1px solid var(--border); border-radius: 14px; background: var(--panel); color: var(--text); outline: none; }
  #text:focus { border-color: var(--accent); }
  .icon-btn { flex: 0 0 auto; width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; font-size: 17px; display: grid; place-items: center; }
  #send { background: var(--accent); color: var(--accent-ink); }
  #send:disabled { opacity: .4; cursor: default; }
</style>
</head>
<body>
<div id="app">
  <header><div class="title"><span class="dot"></span> GMIC AI Assistant</div></header>
  <div id="messages" aria-live="polite"></div>
  <div class="contacts" id="contacts" hidden>
    <div class="lbl">Reach us directly</div>
    <div class="row" id="contactRow"></div>
  </div>
  <footer>
    <textarea id="text" rows="1" placeholder="Type your message…"></textarea>
    <button class="icon-btn" id="send" title="Send" disabled>➤</button>
  </footer>
</div>

<script>
/* 聊天前端(纯文字)。后端:GET /config、POST /event(topic/faq/link)、POST /chat。同源相对路径。 */
const API = (window.GMIC_BOT_API || "").replace(/\/$/, "");
const $ = (id) => document.getElementById(id);
const messagesEl = $("messages"), textEl = $("text"), sendBtn = $("send");

const SID_KEY = "gmic_bot_sid";
let sessionId = localStorage.getItem(SID_KEY);
if (!sessionId) {
  sessionId = "sess_" + (crypto.randomUUID ? crypto.randomUUID() : Date.now() + "_" + Math.floor(Math.random() * 1e6));
  localStorage.setItem(SID_KEY, sessionId);
}
let CONFIG = null, busy = false;

async function postJSON(path, body) {
  const res = await fetch(API + path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  if (!res.ok) throw new Error(path + " -> " + res.status);
  return res.json();
}
function scrollDown() { messagesEl.scrollTop = messagesEl.scrollHeight; }

function addBubble(role, text, opts = {}) {
  const el = document.createElement("div");
  el.className = "msg " + role; el.textContent = text;
  if (opts.link) { const a = document.createElement("a"); a.className = "learn-more"; a.href = opts.link; a.target = "_blank"; a.rel = "noopener"; a.textContent = "Learn more →"; el.appendChild(document.createElement("br")); el.appendChild(a); }
  if (opts.action && opts.action.url) { const a = document.createElement("a"); a.className = "learn-more"; a.href = opts.action.url; a.target = "_blank"; a.rel = "noopener"; a.textContent = opts.action.label || "Open →"; el.appendChild(document.createElement("br")); el.appendChild(a); }
  if (opts.qr) { const img = document.createElement("img"); img.className = "qr-img"; img.src = opts.qr; img.alt = "WeChat QR"; el.appendChild(img); }
  messagesEl.appendChild(el); scrollDown();
  return el;
}
function showTyping() {
  const el = document.createElement("div");
  el.className = "typing"; el.innerHTML = "<span></span><span></span><span></span>";
  messagesEl.appendChild(el); scrollDown();
  return () => el.remove();
}

function renderQuickColumn() {
  const col = document.createElement("div"); col.className = "quick-col";
  for (const a of CONFIG.quickActions || []) {
    const btn = document.createElement("button"); btn.className = "q-btn"; btn.textContent = a.label;
    btn.onclick = () => onQuickAction(a); col.appendChild(btn);
  }
  messagesEl.appendChild(col); scrollDown();
}
async function onQuickAction(a) {
  if (busy) return;
  if (a.type === "link") {
    if (a.url && !a.url.startsWith("TODO")) window.open(a.url, "_blank", "noopener");
    postJSON("/event", { session_id: sessionId, action: "link", id: a.id }).catch(() => {}); return;
  }
  if (a.type === "topic") {
    setBusy(true); const stop = showTyping();
    try { const r = await postJSON("/event", { session_id: sessionId, action: "topic", id: a.id }); stop(); if (r.reply) addBubble("bot", r.reply); }
    catch (e) { stop(); addBubble("bot", "Sorry, something went wrong. Please try again."); }
    setBusy(false); return;
  }
  if (a.type === "faq") renderFaqChips();
}
function renderFaqChips() {
  const wrap = addBubble("bot", "Pick a question:");
  const row = document.createElement("div"); row.className = "faq-chips";
  (CONFIG.faq || []).forEach((item, i) => {
    const c = document.createElement("button"); c.className = "chip"; c.textContent = item.q;
    c.onclick = () => onFaq(i, item.q); row.appendChild(c);
  });
  wrap.appendChild(row); scrollDown();
}
async function onFaq(index, question) {
  if (busy) return;
  addBubble("user", question); setBusy(true); const stop = showTyping();
  try { const r = await postJSON("/event", { session_id: sessionId, action: "faq", index }); stop(); addBubble("bot", r.reply, { link: r.link }); }
  catch (e) { stop(); addBubble("bot", "Sorry, something went wrong. Please try again."); }
  setBusy(false);
}

// 固定"直接联系我们"条(⚡快捷 + 各联系方式;语音已拆走,这里不再有语音按钮)
function renderContacts() {
  const list = CONFIG.contacts || [];
  const row = $("contactRow");
  const q = document.createElement("button");
  q.className = "c-btn"; q.innerHTML = `<span class="ic">⚡</span>Quick`; q.onclick = renderQuickColumn;
  row.appendChild(q);
  for (const c of list) {
    const btn = document.createElement("button"); btn.className = "c-btn";
    btn.innerHTML = `<span class="ic">${c.icon || "•"}</span>${c.label}`;
    btn.onclick = () => onContactClick(c); row.appendChild(btn);
  }
  $("contacts").hidden = false;
}
function onContactClick(c) {
  if (c.type === "qr") addBubble("bot", c.value || "Scan to add us on WeChat:", { qr: c.qr });
  else addBubble("bot", `${c.label}: ${c.value || ""}`, { action: { url: c.url, label: c.open_label } });
}
function renderThrowbacks(list) {
  for (const c of list || []) {
    if (c.type === "qr") addBubble("bot", `Prefer ${c.label}? ${c.value || "Scan to add us."}`, { qr: c.qr });
    else addBubble("bot", `Prefer ${c.label}? You can reach us directly here 👇`, { action: { url: c.url, label: c.open_label } });
  }
}

async function sendText() {
  const text = textEl.value.trim();
  if (!text || busy) return;
  addBubble("user", text); textEl.value = ""; autosize();
  setBusy(true); const stop = showTyping();
  try {
    const r = await postJSON("/chat", { session_id: sessionId, text, page_url: document.referrer || location.href });
    stop(); addBubble("bot", r.reply || "…"); renderThrowbacks(r.contacts);
  } catch (e) { stop(); addBubble("bot", "Sorry, I'm having trouble right now — please try again in a moment."); }
  setBusy(false);
}
function setBusy(v) { busy = v; sendBtn.disabled = v || !textEl.value.trim(); }
function autosize() { textEl.style.height = "auto"; textEl.style.height = Math.min(textEl.scrollHeight, 120) + "px"; sendBtn.disabled = busy || !textEl.value.trim(); }

textEl.addEventListener("input", autosize);
textEl.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendText(); } });
sendBtn.addEventListener("click", sendText);

(async function init() {
  try { CONFIG = await (await fetch(API + "/config")).json(); }
  catch (e) { CONFIG = { greeting: "Hi 👋 How can we help?", quickActions: [], faq: [], contacts: [] }; }
  addBubble("bot", CONFIG.greeting || "Hi 👋 How can we help?");
  renderQuickColumn(); renderContacts();
})();
</script>
</body>
</html>
